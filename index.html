<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Last War - Tormenta del Desierto | Planificador Táctico</title>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/@panzoom/panzoom/dist/panzoom.min.js"></script>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>TORMENTA DEL DESIERTO</h1>
        <div class="btn-group">
            <button class="btn" id="showPlayersBtn">👥 JUGADORES</button>
            <select id="filterStatus">
                <option value="Activo">✅ ACTIVOS</option>
                <option value="Todos">📋 TODOS</option>
            </select>
            <button class="btn btn-primary" id="exportBtn">📸 EXPORTAR</button>
            <button class="btn" id="importJsonBtn">📂 CARGAR</button>
            <input type="file" id="fileInput" accept=".json" style="display: none;">
            <button class="btn" id="exportJsonBtn">💾 GUARDAR</button>
            <button class="btn btn-danger" id="resetBtn">🗑️ RESET</button>
        </div>
    </div>

    <div class="map-wrapper">
        <div class="map-container" id="mapContainer">
            <img src="tormenta.jpeg" alt="Mapa Tormenta del Desierto" id="mapImage">
            <svg id="linesOverlay"></svg>
            <div id="structuresOverlay"></div>
        </div>
    </div>
</div>

<!-- Tabs para seleccionar vista -->
<div class="tabs-header" id="tabsHeader">
    <button class="tab-btn active" data-tab="titulares">⚔️ TITULARES</button>
    <button class="tab-btn" data-tab="sustitutos">🔄 SUSTITUTOS</button>
</div>

<!-- Sidebar Titulares -->
<div id="sidebarTitulares" class="sidebar">
    <div class="sidebar-header">
        <h3>⚔️ GUERREROS</h3>
        <button class="close-sidebar" id="closeSidebar">✕ CERRAR</button>
    </div>
    
    <div class="add-player-form">
        <h4 style="color: #ffdd99; font-size: 0.85rem; margin-bottom: 10px;">➕ Agregar Nuevo Jugador</h4>
        <div style="display: flex; gap: 8px; margin-bottom: 10px;">
            <input type="text" id="newPlayerName" class="search-input" placeholder="Nombre" style="margin-bottom: 0; flex: 2; padding: 8px 12px;">
            <input type="text" id="newPlayerPower" class="search-input" placeholder="Poder" style="margin-bottom: 0; flex: 1; padding: 8px 12px;">
            <button class="btn btn-primary" id="addPlayerBtn" style="padding: 8px 12px; font-size: 0.8rem;">AÑADIR</button>
        </div>
    </div>
    <input type="text" id="playerSearch" class="search-input" placeholder="🔍 Buscar jugador...">
    <div id="playerList" class="player-list"></div>
</div>

<!-- Sidebar Sustitutos -->
<div id="sidebarSustitutos" class="sidebar sidebar-sustitutos">
    <div class="sidebar-header">
        <h3>🔄 SUSTITUTOS</h3>
        <button class="close-sidebar" id="closeSidebarSustitutos">✕ CERRAR</button>
    </div>
    <div style="margin-bottom: 20px; padding-bottom: 16px; border-bottom: 2px solid rgba(240, 165, 0, 0.2);">
        <h4 style="color: #ffdd99; font-size: 0.85rem; margin-bottom: 10px;">➕ Agregar Sustitutos</h4>
        <input type="text" id="addSubstitutesSearch" class="search-input" placeholder="🔍 Buscar jugador..." style="margin-bottom: 10px;">
        <div id="addSubstitutesList" class="player-list" style="max-height: 300px; overflow-y: auto;"></div>
    </div>
    <h4 style="color: #ffdd99; font-size: 0.85rem; margin-bottom: 10px;">📋 Sustitutos Asignados</h4>
    <div id="substitutesList" class="player-list"></div>
</div>

<!-- Modal -->
<div id="modal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Asignar jugadores</h3>
        <input type="text" id="modalSearch" class="search-input" placeholder="🔍 Buscar jugador...">
        <div id="modalPlayersList"></div>
        <button class="btn" id="closeModal" style="margin-top: 20px; width: 100%;">CERRAR</button>
    </div>
</div>

<script src="app.js"></script>
<div class="footer-custom">
  Develop by Skynnz - FC. 2026
</div>
</body>
</html>
